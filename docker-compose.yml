version: '3.8'

services:
  # 後端 Flask 服務 (對外 port: 22223)
  backend:
    build:
      context: ./back_end
      dockerfile: Dockerfile
    container_name: flask-backend
    ports:
      - "22223:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - PORT=5000
    env_file:
      - ./back_end/.env
    volumes:
      - ./back_end:/app
      - /app/__pycache__
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端 Angular 服務 (對外 port: 22222)
  frontend:
    build:
      context: ./front_end
      dockerfile: Dockerfile
    container_name: angular-frontend
    ports:
      - "22222:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
