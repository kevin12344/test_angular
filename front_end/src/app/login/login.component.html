<div class="login-wrapper">
  <div class="login-card">
    <h2>系統登入</h2>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      
      <div class="form-group">
        <label>帳號</label>
        <input type="text" name="username" [(ngModel)]="loginData.username" required placeholder="請輸入帳號">
      </div>

      <div class="form-group">
        <label>密碼</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" required placeholder="請輸入密碼">
      </div>

      <div class="button-group">
        <button type="submit" [disabled]="!loginForm.form.valid">登入</button>
        <button type="button" (click)="onClear()">清除</button>
      </div>

    </form>
  </div>
</div>
